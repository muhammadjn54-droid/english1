<!DOCTYPE html>
<html lang="tg" id="html-root" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистратсия | ErajAcademy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: '#4F46E5' } } }
        }
    </script>
</head>
<body class="bg-slate-50 dark:bg-[#0f172a] min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-md bg-white dark:bg-[#1e293b] rounded-[2.5rem] p-8 shadow-2xl border dark:border-white/5 animate__animated animate__fadeIn">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-primary/10 text-primary rounded-2xl flex items-center justify-center mx-auto mb-4 text-2xl">
                <i class="fas fa-user-plus"></i>
            </div>
            <h1 class="text-2xl font-black dark:text-white">Хуш омадед!</h1>
            <p class="text-slate-400 text-sm mt-2">Барои оғози омӯзиш сабти ном кунед</p>
        </div>

        <form onsubmit="handleRegister(event)" class="space-y-4">
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2 ml-1">Номи Шумо</label>
                <input type="text" id="reg-name" required class="w-full p-4 bg-slate-50 dark:bg-slate-800/50 border-2 border-transparent focus:border-primary rounded-2xl outline-none transition-all dark:text-white" placeholder="Масалан: Умарҷон">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2 ml-1">Телефон ё Email</label>
                <input type="text" id="reg-contact" required class="w-full p-4 bg-slate-50 dark:bg-slate-800/50 border-2 border-transparent focus:border-primary rounded-2xl outline-none transition-all dark:text-white" placeholder="+992 XXX XX XX">
            </div>
            <button type="submit" class="w-full py-4 bg-primary text-white rounded-2xl font-bold shadow-lg shadow-primary/30 hover:scale-[1.02] active:scale-95 transition-all mt-4">
                Эҷоди Профил
            </button>
        </form>
    </div>

 <script>
    function handleRegister(event) {
        event.preventDefault();
        
        const name = document.getElementById('reg-name').value;
        const contact = document.getElementById('reg-contact').value;
        const time = new Date().toLocaleTimeString();

        // 1. Захираи маълумоти корбар дар браузери худаш
        localStorage.setItem('userName', name);
        localStorage.setItem('userContact', contact);
        localStorage.setItem('isRegistered', 'true');

        // 2. Имитатсияи фиристодани маълумот ба базаи Админ (Умарҷон)
        // Мо як массиви "Users" месозем, ки Админ онро мебинад
        let allUsers = JSON.parse(localStorage.getItem('allUsers') || '[]');
        allUsers.push({ name: name, contact: contact, time: time });
        localStorage.setItem('allUsers', JSON.stringify(allUsers));

        alert("Табрик, " + name + "! Шумо муваффақона сабти ном шудед.");
        window.location.href = "index.html"; 
    }
</script>
</body>
</html>
