<!DOCTYPE html>
<html lang="tg" id="html-root" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Курсҳо | ErajAcademy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: '#3b82f6', darkBg: '#0f172a', darkCard: '#1e293b' } } }
        }
    </script>
</head>
<body class="bg-slate-50 dark:bg-darkBg text-slate-900 dark:text-slate-100 transition-colors duration-300 pb-20">

    <div class="fixed top-0 w-full z-50 bg-white/80 dark:bg-darkBg/80 backdrop-blur-md p-4 flex items-center justify-between border-b dark:border-white/5">
        <a href="index.html" class="flex items-center gap-2 font-bold text-primary">
            <i class="fas fa-arrow-left"></i> Асосӣ
        </a>
        <span class="font-black">Курсҳои омӯзишӣ</span>
        <div class="w-10"></div> </div>

    <header class="pt-24 pb-10 px-6 text-center">
        <h1 class="text-4xl font-black mb-4">Ҳамаи <span class="text-primary">Курсҳо</span></h1>
        <p class="text-slate-500 dark:text-slate-400">Дарси дилхоҳатонро интихоб кунед</p>
    </header>

    <main class="max-w-7xl mx-auto px-6 pb-32 grid gap-6 md:grid-cols-3">
        
        <div class="bg-white dark:bg-darkCard rounded-3xl p-5 shadow-sm border dark:border-white/5 hover:scale-[1.02] transition-transform">
            <div class="h-48 bg-slate-200 dark:bg-slate-700 rounded-2xl mb-4 overflow-hidden">
                <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=500" class="w-full h-full object-cover">
            </div>
            <h3 class="text-xl font-bold mb-2">Дарси 1: Асосҳои забон</h3>
            <p class="text-sm text-slate-500 mb-6">Дар ин дарс мо қоидаҳои аввалияро меомӯзем.</p>
            <a href="./lessons/lesson.html" class="block text-center py-3 bg-primary text-white rounded-xl font-bold">Шурӯъ кардан</a>
        </div>

        <div class="bg-white dark:bg-darkCard rounded-3xl p-5 shadow-sm border dark:border-white/5 hover:scale-[1.02] transition-transform">
            <div class="h-48 bg-slate-200 dark:bg-slate-700 rounded-2xl mb-4 overflow-hidden">
                <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=500" class="w-full h-full object-cover">
            </div>
            <h3 class="text-xl font-bold mb-2">Дарси 2: Грамматика</h3>
            <p class="text-sm text-slate-500 mb-6">Такмили дониш дар бахши грамматикаи муосир.</p>
            <a href="./lessons/lesson-2.html" class="block text-center py-3 bg-primary text-white rounded-xl font-bold">Шурӯъ кардан</a>
        </div>

    </main>

    <nav class="md:hidden fixed bottom-6 left-6 right-6 h-16 bg-white/80 dark:bg-darkCard/80 backdrop-blur-md rounded-2xl flex justify-around items-center z-[100] shadow-xl border dark:border-white/10">
        <a href="index.html" class="text-slate-400 p-3"><i class="fas fa-home text-lg"></i></a>
        <a href="courses.html" class="text-primary p-3"><i class="fas fa-book-open text-lg"></i></a>
        
        <button onclick="toggleDarkMode()" class="w-12 h-12 bg-primary text-white rounded-xl shadow-lg flex items-center justify-center -mt-8 border-4 border-slate-50 dark:border-darkBg transition-transform active:scale-90">
            <i class="fas fa-moon dark:hidden"></i>
            <i class="fas fa-sun hidden dark:block text-yellow-400"></i>
        </button>
        
        <a href="allquiz/quiz.html" class="text-slate-400 p-3"><i class="fas fa-vial text-lg"></i></a>
        <a href="profile.html" class="text-slate-400 p-3"><i class="fas fa-user text-lg"></i></a>
    </nav>

    <script>
        function toggleDarkMode() {
            const html = document.getElementById('html-root');
            html.classList.toggle('dark');
            localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
        }
        if (localStorage.getItem('theme') === 'dark') {
            document.getElementById('html-root').classList.add('dark');
        }
    </script>
</body>
</html>
