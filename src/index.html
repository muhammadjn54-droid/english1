<!DOCTYPE html>
<html lang="tg" id="html-root" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ErajAcademy | Ояндаи Рақамӣ</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        darkBg: '#0f172a',
                        darkCard: '#1e293b'
                    }
                }
            }
        }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            transition: background-color 0.4s;
        }

        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .dark .glass {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .gradient-text {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>

<body class="bg-slate-50 dark:bg-darkBg text-slate-900 dark:text-slate-100 overflow-x-hidden pb-24 md:pb-0">

    <nav class="fixed w-full z-[100] transition-all duration-300 bg-white/80 dark:bg-darkBg/80 backdrop-blur-md border-b dark:border-white/5 p-4"
        id="navbar">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div
                    class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center text-white shadow-lg font-bold text-xl">
                    E</div>
                <span class="text-xl font-extrabold tracking-tight">Eraj<span class="text-primary">Academy</span></span>
            </div>

            <div class="hidden md:flex items-center space-x-8 font-semibold text-sm">
                <a href="index.html" class="text-primary">Асосӣ</a>
                <a href="courses.html" class="hover:text-primary transition-colors">Курсҳо</a>
                <button onclick="toggleDarkMode()"
                    class="w-10 h-10 bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center">
                    <i class="fas fa-moon dark:hidden"></i>
                    <i class="fas fa-sun hidden dark:block text-yellow-400"></i>
                </button>
                <a href="profile.html"
                    class="bg-primary text-white px-6 py-2.5 rounded-xl hover:opacity-90 transition-all font-bold">Профил</a>
            </div>
        </div>
    </nav>

    <header class="pt-40 pb-20 px-6 text-center">
        <div class="max-w-4xl mx-auto" data-aos="fade-up">
            <span
                class="px-4 py-1.5 rounded-full bg-primary/10 text-primary text-[10px] font-bold uppercase tracking-widest mb-6 inline-block">
                Хуш омадед ба ErajAcademy
            </span>
            <h1 class="text-5xl md:text-7xl font-black mb-6 leading-tight">
                Дониши худро бо <br> <span class="gradient-text">мо такмил диҳед</span>
            </h1>
            <p class="text-slate-500 dark:text-slate-400 text-lg mb-10 max-w-xl mx-auto">
                Беҳтарин курсҳои омӯзишӣ ва видеодарсҳо барои пешрафти шумо.
            </p>
            <div class="flex flex-wrap justify-center gap-4">
                <a href="./lessons/lesson.html"
                    class="px-10 py-4 bg-primary text-white rounded-2xl font-bold shadow-lg shadow-primary/30 active:scale-95 transition-all">Оғози
                    дарс</a>
                <a href="about.html"
                    class="px-10 py-4 bg-white dark:bg-slate-800 rounded-2xl font-bold border dark:border-white/5 transition-all">Маълумот</a>
            </div>
        </div>
    </header>

    <section class="py-10 px-6 max-w-7xl mx-auto grid grid-cols-2 md:grid-cols-4 gap-4">
        <div class="p-6 rounded-3xl bg-white dark:bg-darkCard border dark:border-white/5 text-center shadow-sm"
            data-aos="fade-up" data-aos-delay="100">
            <i class="fas fa-graduation-cap text-3xl text-primary mb-4"></i>
            <a href="./courses.html">

                <h3 class="font-bold">Курсҳо</h3>
            </a>
        </div>
        <div class="p-6 rounded-3xl bg-white dark:bg-darkCard border dark:border-white/5 text-center shadow-sm"
            data-aos="fade-up" data-aos-delay="200">
            <i class="fas fa-video text-3xl text-primary mb-4"></i>
            <a href="/src/lessons/lesson.html">

                <h3 class="font-bold">Видеоҳо</h3>
            </a>
        </div>
        <div class="p-6 rounded-3xl bg-white dark:bg-darkCard border dark:border-white/5 text-center shadow-sm"
            data-aos="fade-up" data-aos-delay="300">
            <i class="fas fa-tasks text-3xl text-primary mb-4"></i>
            <a href="./allquiz/quiz.html">
                <h3 class="font-bold">Тестҳо</h3>
            </a>
        </div>
        <div class="p-6 rounded-3xl bg-white dark:bg-darkCard border dark:border-white/5 text-center shadow-sm"
            data-aos="fade-up" data-aos-delay="400">
         <i class="fas fa-book-reader"></i>
         <a href="./grammar.html">
             <h3 class="font-bold">грамматика</h3>
         </a>
        </div>
    </section>

    <nav
        class="md:hidden fixed bottom-6 left-6 right-6 h-16 glass rounded-2xl flex justify-around items-center z-[100] px-2 shadow-xl">
        <a href="index.html" class="text-primary p-3"><i class="fas fa-home text-lg"></i></a>
        <a href="courses.html" class="text-slate-400 p-3"><i class="fas fa-book-open text-lg"></i></a>

        <button onclick="toggleDarkMode()"
            class="w-12 h-12 bg-primary text-white rounded-xl shadow-lg flex items-center justify-center -mt-8 border-4 border-slate-50 dark:border-darkBg transition-transform active:scale-90">
            <i class="fas fa-moon dark:hidden"></i>
            <i class="fas fa-sun hidden dark:block text-yellow-300"></i>
        </button>

        <a href="quiz.html" class="text-slate-400 p-3"><i class="fas fa-vial text-lg"></i></a>
        <a href="profile.html" class="text-slate-400 p-3"><i class="fas fa-user text-lg"></i></a>
    </nav>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });

        // Dark Mode Logic
        function toggleDarkMode() {
            const html = document.getElementById('html-root');
            html.classList.toggle('dark');
            localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
        }

        // Load saved theme
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.getElementById('html-root').classList.add('dark');
        } else {
            document.getElementById('html-root').classList.remove('dark');
        }

        // Navbar Scroll Effect
        window.onscroll = () => {
            const nav = document.getElementById('navbar');
            if (window.scrollY > 20) {
                nav.classList.add('py-2', 'shadow-md');
            } else {
                nav.classList.remove('py-2', 'shadow-md');
            }
        };
    </script>
</body>

</html>
