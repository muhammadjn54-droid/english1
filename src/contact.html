<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тамос бо мо</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-6">

    <div class="max-w-md mx-auto mt-10 bg-gray-800 p-8 rounded-3xl shadow-2xl">
        <h1 class="text-3xl font-bold mb-6">Бо мо тамос гиред</h1>
        
        <form class="space-y-4">
            <input type="text" placeholder="Ному насаб" class="w-full p-4 rounded-xl bg-gray-700 border border-gray-600 focus:outline-none focus:border-blue-500">
            
            <textarea placeholder="Саволи шумо..." class="w-full p-4 rounded-xl bg-gray-700 border border-gray-600 h-32 focus:outline-none focus:border-blue-500"></textarea>
            
            <button class="w-full bg-blue-600 py-4 rounded-xl font-bold hover:bg-blue-700 transition">
                Ирсол кардан
            </button>
        </form>
    </div>

</body>
</html>
